<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Notes & Lists</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="sidebar-toggle-wrapper">
        <button id="toggleSidebarBtn"><i class="fas fa-bars"></i> <span>Notes</span></button>
    </div>

    <div class="save-indicator" id="saveIndicator">
        <i class="fas fa-check-circle"></i> Saved
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="status-panel" id="statusPanel">
                <div class="status-info">
                    <i class="fas fa-cloud"></i>
                    <span id="statusText">Cloud sync: <span class="disconnected">not configured</span></span>
                </div>
                <div class="status-actions">
                    <button onclick="syncNow()" id="syncBtn"><i class="fas fa-sync"></i> Sync</button>
                </div>
            </div>
            <div id="sidebarSectionsContainer"></div>
            <button class="add-section-btn" id="addSectionBtn"><i class="fas fa-plus-circle"></i> Add section</button>
        </div>
    </aside>

    <main class="main" id="mainContent">
        <div id="mainSectionsContainer"></div>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="ui.js"></script>
    <script src="crud.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const addBtn = document.getElementById('addSectionBtn');
        if (addBtn) {
            addBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                const name = prompt('Enter section name:');
                if (name && name.trim()) {
                    const idx = sections.length;
                    const size = getDefaultBoxSize(idx);
                    sections.push({
                        id: genId(),
                        name: name.trim(),
                        subs: [],
                        notes: [],
                        items: [],
                        width: size.width,
                        height: size.height,
                        x: size.x,
                        y: size.y
                    });
                    render();
                    const newSection = sections[sections.length - 1];
                    if (newSection) {
                        selectSection(newSection.id);
                    }
                }
            });
        }

        const toggleBtn = document.getElementById('toggleSidebarBtn');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', function() {
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.toggle('hidden');
                this.innerHTML = sidebar.classList.contains('hidden') ?
                    '<i class="fas fa-chevron-right"></i> <span>Notes</span>' :
                    '<i class="fas fa-bars"></i> <span>Notes</span>';
            });
        }
    });

    window.addSectionFromMain = function() {
        const name = prompt('Section name:');
        if (name && name.trim()) {
            const idx = sections.length;
            const size = getDefaultBoxSize(idx);
            sections.push({
                id: genId(),
                name: name.trim(),
                subs: [],
                notes: [],
                items: [],
                width: size.width,
                height: size.height,
                x: size.x,
                y: size.y
            });
            render();
            const newSection = sections[sections.length - 1];
            if (newSection) selectSection(newSection.id);
        }
    };
    </script>

</body>
</html>
